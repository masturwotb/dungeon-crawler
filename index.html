<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dungeon Crawler</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#0c0c12; --panel:#15151f; --panel2:#1d1d2b; --border:#2c2c40;
    --txt:#cfcfe0; --dim:#7a7a92; --accent:#9d7bff; --hp:#e2483d; --xp:#3da0e2;
    --gold:#e2b93d; --good:#5ad469;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:radial-gradient(circle at 50% 0%,#16121f,#08080c 70%); color:var(--txt);
    font-family:'Consolas','SF Mono',Menlo,monospace; font-size:13px;
    display:flex; flex-direction:column; align-items:center; padding:14px; gap:12px; min-height:100vh;
  }
  h1{font-size:18px; margin:0; letter-spacing:1px; color:var(--accent); text-shadow:0 0 14px #9d7bff66}
  .top{display:flex; gap:12px; align-items:center; flex-wrap:wrap; justify-content:center}
  button{
    font-family:inherit; font-size:12px; background:var(--panel2); color:var(--txt);
    border:1px solid var(--border); border-radius:6px; padding:6px 10px; cursor:pointer; transition:.12s;
  }
  button:hover:not(:disabled){background:var(--accent); color:#0c0c12; border-color:var(--accent)}
  button:disabled{opacity:.35; cursor:not-allowed}
  .main{display:flex; gap:14px; flex-wrap:wrap; justify-content:center; align-items:flex-start}
  .stage{position:relative; width:600px; height:600px; border-radius:10px; overflow:hidden;
         border:1px solid var(--border); box-shadow:0 0 50px #000a, inset 0 0 60px #0008; background:#06060a;
         will-change:transform}
  .stage canvas{position:absolute; inset:0; image-rendering:pixelated}
  .side{display:flex; flex-direction:column; gap:10px; width:300px; max-height:616px; overflow-y:auto; padding-right:4px;}
  .side::-webkit-scrollbar{width:8px} .side::-webkit-scrollbar-thumb{background:#2c2c40;border-radius:4px}
  .invgrid{display:grid; grid-template-columns:repeat(5,48px); gap:6px; justify-content:center; margin-top:8px;}
  .slot{width:48px; height:48px; background:#0d0d16; border:1px solid var(--border); border-radius:6px;
        position:relative; cursor:pointer; box-shadow:inset 0 0 6px #0008; transition:border-color .1s;}
  .slot.empty{cursor:default; box-shadow:inset 0 0 0 2px #ffffff06;}
  .slot:not(.empty):hover{border-color:var(--accent);}
  .slot.equipped{border-color:var(--gold); box-shadow:0 0 9px #e2b93d77, inset 0 0 6px #0006;}
  .slot canvas{width:48px; height:48px; display:block; border-radius:6px;}
  #tip{position:fixed; z-index:80; pointer-events:none; background:#12121b; border:1px solid var(--accent);
       border-radius:8px; padding:8px 11px; font-size:12px; max-width:230px; box-shadow:0 6px 26px #000c;}
  #tip.hidden{display:none;}
  #tip .tname{font-weight:bold; color:#fff;}
  #tip .ttype{color:var(--dim); text-transform:capitalize;}
  #tip .teff{color:var(--accent); margin-top:4px;}
  #tip .tval{color:var(--gold); margin-top:2px;}
  #tip .teq{color:var(--good); font-weight:bold; margin-top:4px; letter-spacing:1px;}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px}
  .card h2{font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin:0 0 8px}
  .stat{display:flex; justify-content:space-between; margin:3px 0}
  .bar{height:13px; background:#000; border-radius:6px; overflow:hidden; margin:4px 0; position:relative}
  .bar > div{height:100%; transition:width .35s cubic-bezier(.4,1.3,.5,1)}
  .pad{display:grid; grid-template-columns:repeat(3,1fr); gap:6px; width:180px; margin:0 auto}
  .pad button{padding:11px 0}
  .pad .sp{visibility:hidden}
  .ctx{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; justify-content:center}
  .inv-item{display:flex; align-items:center; gap:6px; padding:5px 0; border-bottom:1px solid var(--border)}
  .inv-item .nm{flex:1; font-size:12px}
  .inv-item button{padding:3px 8px; font-size:11px}
  .tag{font-size:10px; padding:1px 5px; border-radius:4px; background:var(--panel2); color:var(--dim)}
  #log{width:640px; max-width:100%; background:var(--panel); border:1px solid var(--border);
       border-radius:10px; padding:12px; min-height:96px}
  #log div{padding:2px 0; border-bottom:1px solid #ffffff08}
  #log div:last-child{color:#fff}
  #status{font-size:13px; color:var(--dim); min-height:16px; text-align:center}
  .legend{font-size:11px; color:var(--dim); text-align:center; max-width:660px; line-height:1.6}
  .win{color:var(--good)!important} .dead{color:var(--hp)!important}
  /* modal */
  .modal{position:fixed; inset:0; background:rgba(4,4,8,0.72); display:flex; align-items:center; justify-content:center; z-index:50;}
  .modal.hidden{display:none;}
  .modal-box{background:linear-gradient(180deg,#1a1a28,#12121b); border:1px solid var(--accent); border-radius:14px;
             padding:22px; width:400px; max-width:92vw; box-shadow:0 12px 60px #000, 0 0 40px #9d7bff33; text-align:center;
             animation:slideIn .35s cubic-bezier(.2,1.2,.3,1);}
  @keyframes slideIn{ from{ transform:translateY(28px) scale(.96); opacity:0 } to{ transform:none; opacity:1 } }
  .modal-box h2{margin:0 0 4px; color:var(--accent); letter-spacing:2px; text-shadow:0 0 16px #9d7bff66}
  .modal-box p{margin:4px 0 0; color:var(--dim);}
  .choice{display:flex; flex-direction:column; gap:8px; margin-top:16px;}
  .choice button{padding:13px; font-size:13px; border-color:var(--accent)}
  .shop-list{margin-top:14px;}
  .shop-item{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); text-align:left;}
  .shop-item canvas{width:40px; height:40px; background:#0d0d16; border:1px solid var(--border); border-radius:6px;}
  .shop-item .nm{flex:1;}
  .shop-item .pr{color:var(--gold); width:54px; text-align:right;}
  .shop-msg{min-height:16px; color:var(--gold); margin-top:8px; font-size:12px;}
  .modal-box .close{margin-top:14px;}
  .modal-box input.txt{font-family:inherit;font-size:14px;background:var(--panel2);color:var(--txt);
    border:1px solid var(--accent);border-radius:6px;padding:9px 10px;width:210px;text-align:center;margin-top:14px;}
  .setrow{display:flex;align-items:center;gap:10px;margin:16px 0;}
  .setrow label{width:70px;text-align:left;color:var(--dim);}
  .setrow input[type=range]{flex:1;accent-color:var(--accent);}
  .setrow .val{width:46px;text-align:right;color:var(--gold);}
  table.lb{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px;}
  table.lb th,table.lb td{padding:5px 6px;border-bottom:1px solid var(--border);text-align:right;}
  table.lb th:nth-child(2),table.lb td:nth-child(2),table.lb th:nth-child(3),table.lb td:nth-child(3){text-align:left;}
  table.lb tr.me{background:#9d7bff2e;color:#fff;}
  table.lb th{color:var(--dim);text-transform:uppercase;font-size:10px;letter-spacing:1px;}
  #wrap{display:flex;flex-direction:column;align-items:center;gap:12px;transform-origin:top center;}
  :fullscreen{background:#08080c;overflow:hidden;}
  .stage canvas{width:100%; height:100%;}
  /* ===== mobile / Telegram layout ===== */
  #mobileUI{display:none;}
  body.mobile{padding:0; gap:0; height:100dvh; overflow:hidden; justify-content:flex-start;}
  body.mobile #wrap{gap:0; width:100%; height:100dvh; display:flex; flex-direction:column;}
  body.mobile h1, body.mobile .legend, body.mobile #log, body.mobile .side{display:none!important;}
  body.mobile .top{order:0; padding:5px 8px; gap:6px; flex-wrap:wrap;}
  body.mobile .top #status{display:none;}
  body.mobile .top button{padding:6px 9px; font-size:12px;}
  body.mobile #fsBtn{display:none;}
  body.mobile .main{order:1; flex:0 0 auto; padding:4px 0;}
  body.mobile .stage{box-shadow:0 0 24px #0008;}
  body.mobile #mobileUI{display:flex; order:2; flex-direction:column; gap:6px; flex:1 1 auto; padding:6px 8px; min-height:0; width:100%;}
  #mhud{display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:6px 8px;}
  #mhud .mhp{flex:1; min-width:70px; height:12px; background:#000; border-radius:6px; overflow:hidden;}
  #mhud .mhp>div{height:100%; background:linear-gradient(90deg,#8a1d16,#e2483d); transition:width .3s;}
  #mhud .mstat{white-space:nowrap;}
  .mlog{background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:6px 8px; font-size:11px; line-height:1.45; min-height:46px; max-height:54px; overflow:hidden; color:var(--dim); cursor:pointer;}
  .mlog div:last-child{color:#fff;}
  #mctrls{display:flex; align-items:flex-end; justify-content:space-between; gap:10px; margin-top:auto;}
  .dpad{display:grid; grid-template-columns:repeat(3,56px); grid-template-rows:repeat(3,56px); gap:6px; flex:0 0 auto;}
  .dpad .sp{visibility:hidden;}
  .dpad button{font-size:22px; border-radius:12px; padding:0;}
  .mright{display:flex; flex-direction:column; gap:6px; flex:1; align-items:stretch;}
  #mctx{display:flex; flex-direction:column; gap:6px;}
  .mactions{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .mbtn{min-height:48px; font-size:14px; padding:8px; border-radius:12px;}
  .mbtn.wide{grid-column:1 / -1;}
  body.mobile canvas, body.mobile .dpad button, body.mobile .mbtn{touch-action:none;}
  .sheet{position:fixed; left:0; right:0; bottom:0; height:80dvh; z-index:70;
    background:linear-gradient(180deg,#15151f,#0c0c12); border-top:2px solid var(--accent); border-radius:16px 16px 0 0;
    transform:translateY(101%); transition:transform .28s cubic-bezier(.2,.9,.3,1); display:flex; flex-direction:column; padding:12px;}
  .sheet:not(.hidden){transform:translateY(0);}
  .sheet.hidden{pointer-events:none;}
  .sheet .sheetHdr{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .sheet .sheetHdr h2{margin:0; color:var(--accent); font-size:14px; letter-spacing:1px;}
  .sheet .scrollable{overflow-y:auto; -webkit-overflow-scrolling:touch; flex:1; min-height:0;}
  #minv{justify-content:flex-start;}
  #logFull div{padding:4px 0; border-bottom:1px solid #ffffff10; font-size:13px;}
  #mBagTop{display:none;}
  /* ===== landscape: canvas fills screen, controls overlay on top ===== */
  body.mobile.landscape{overflow:hidden;}
  body.mobile.landscape h1, body.mobile.landscape .legend, body.mobile.landscape #log,
  body.mobile.landscape .side, body.mobile.landscape .top{display:none!important;}
  body.mobile.landscape #wrap{display:block; height:100dvh;}
  body.mobile.landscape .main{position:fixed; inset:0; padding:0; margin:0; z-index:0; display:block;}
  body.mobile.landscape .stage{position:fixed; border:none; border-radius:0; box-shadow:none;}
  body.mobile.landscape #mobileUI{display:block; padding:0;}
  body.mobile.landscape #mctrls{display:contents;}
  body.mobile.landscape #mhud{position:fixed; top:0; left:0; right:0; z-index:20; border:none; border-radius:0;
    background:rgba(10,10,16,0.55); justify-content:center; flex-wrap:nowrap; font-size:11px; gap:8px; padding:4px 10px;}
  body.mobile.landscape #mhud .mhp{max-width:90px;}
  body.mobile.landscape #mlog{position:fixed; left:50%; transform:translateX(-50%); bottom:6px; width:auto; max-width:62vw;
    z-index:20; background:rgba(10,10,16,0.45); border:none; text-align:center; font-size:10px; min-height:0; max-height:36px; padding:4px 10px;}
  body.mobile.landscape .dpad{position:fixed; left:10px; bottom:10px; z-index:25;}
  body.mobile.landscape .mright{position:fixed; right:10px; bottom:10px; width:auto; z-index:25;}
  body.mobile.landscape #mBag{display:none;}
  body.mobile.landscape #mBagTop{display:flex; position:fixed; top:8px; right:8px; z-index:26;
    align-items:center; justify-content:center; min-width:48px; min-height:48px; font-size:20px;}
  body.mobile.landscape .lc{opacity:0.2; transition:opacity .3s;}
  body.mobile.landscape.touched .lc{opacity:0.6;}
</style>
</head>
<body>
  <div id="wrap">
  <h1>⚔ DUNGEON CRAWLER</h1>
  <div class="top">
    <button id="newgame">New Game</button>
    <button id="sound">🔊 Sound: On</button>
    <button id="settingsBtn" title="Settings">⚙</button>
    <button id="lbBtn" title="Leaderboard">🏆</button>
    <button id="fsBtn" title="Fullscreen">⛶</button>
    <span id="status">Press New Game. Reach floor 10 and slay the Dragon.</span>
  </div>

  <div class="main">
    <div class="stage" id="stage">
      <canvas id="bg" width="600" height="600"></canvas>
      <canvas id="fx" width="600" height="600"></canvas>
    </div>
    <div class="side">
      <div class="card" id="hud"><h2>Hero</h2><div class="dim">No game loaded.</div></div>
      <div class="card">
        <h2>Move · WASD/Arrows · Space wait · G grab · E shop</h2>
        <div class="pad">
          <div class="sp"></div><button data-act="move_north">↑ N</button><div class="sp"></div>
          <button data-act="move_west">← W</button><button data-act="wait">·</button><button data-act="move_east">E →</button>
          <div class="sp"></div><button data-act="move_south">↓ S</button><div class="sp"></div>
        </div>
        <div class="ctx" id="ctx"></div>
      </div>
      <div class="card" id="invCard"><h2 id="invHdr">Inventory</h2><div id="inv" class="dim">—</div></div>
    </div>
  </div>
  <div id="log"></div>
  <div class="legend">Torchlit BSP dungeon · Floors 1-9 scale up · Floor 10 = the Dragon · Shop (S) · Permadeath.</div>

  <button id="mBagTop" class="lc">🎒</button>
  <div id="mobileUI">
    <div id="mhud" class="lc"></div>
    <div id="mlog" class="mlog lc"></div>
    <div id="mctrls">
      <div class="dpad lc">
        <div class="sp"></div><button id="mN">▲</button><div class="sp"></div>
        <button id="mW">◀</button><div class="sp"></div><button id="mE">▶</button>
        <div class="sp"></div><button id="mS">▼</button><div class="sp"></div>
      </div>
      <div class="mright lc">
        <div id="mctx"></div>
        <div class="mactions">
          <button class="mbtn" id="mWait">⏳ WAIT</button>
          <button class="mbtn" id="mGrab">✋ GRAB</button>
          <button class="mbtn" id="mShop">🛒 SHOP</button>
          <button class="mbtn" id="mBag">🎒 BAG</button>
        </div>
      </div>
    </div>
  </div>
  </div>

  <div id="modal" class="modal hidden"><div class="modal-box" id="modalBox"></div></div>
  <div id="settings" class="modal hidden"><div class="modal-box" id="settingsBox"></div></div>
  <div id="tip" class="hidden"></div>

  <div id="invOverlay" class="sheet hidden">
    <div class="sheetHdr"><h2 id="minvHdr">Inventory</h2><button id="invClose">✕ Close</button></div>
    <div id="minv" class="invgrid scrollable"></div>
  </div>
  <div id="logOverlay" class="sheet hidden">
    <div class="sheetHdr"><h2>Adventure Log</h2><button id="logClose">✕ Close</button></div>
    <div id="logFull" class="scrollable"></div>
  </div>

<script>
"use strict";
const N=40, TILE=40, VW=15, VH=15, CW=VW*TILE, CH=VH*TILE;
const bg=document.getElementById('bg'), bgctx=bg.getContext('2d');
const fx=document.getElementById('fx'), fxctx=fx.getContext('2d');
const stageEl=document.getElementById('stage');
const mapCanvas=document.createElement('canvas'); mapCanvas.width=N*TILE; mapCanvas.height=N*TILE;
const mapCtx=mapCanvas.getContext('2d');
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const fmt=n=>Number.isInteger(n)?n:(+n.toFixed(1));
const TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints>0;
const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;

// ---------- RNG ----------
const rnd=()=>Math.random();
const rndInt=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const choice=a=>a[Math.floor(Math.random()*a.length)];
const chance=p=>Math.random()<p;
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* =========================================================
   AUDIO — Web Audio API, all procedural (layered)
   ========================================================= */
let actx=null, masterGain=null, musicGain=null, sfxGain=null, muted=false, musicOn=false, NOISE=null;
let mTimers=[];
let musicVol=+(localStorage.getItem('cdc_music')??70), sfxVol=+(localStorage.getItem('cdc_sfx')??80);
function initAudio(){
  if(actx) return;
  actx=new (window.AudioContext||window.webkitAudioContext)();
  masterGain=actx.createGain(); masterGain.gain.value=muted?0:1; masterGain.connect(actx.destination);
  musicGain=actx.createGain(); musicGain.gain.value=musicVol/100; musicGain.connect(masterGain);
  sfxGain=actx.createGain(); sfxGain.gain.value=sfxVol/100; sfxGain.connect(masterGain);
  const len=actx.sampleRate, b=actx.createBuffer(1,len,actx.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1; NOISE=b;
}
function tone(freq,type,dur,vol,glideTo,delay,dest){
  if(!actx) return; const t=actx.currentTime+(delay||0);
  const o=actx.createOscillator(), g2=actx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  if(glideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,glideTo),t+dur);
  g2.gain.setValueAtTime(0.0001,t); g2.gain.exponentialRampToValueAtTime(vol,t+0.012);
  g2.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g2); g2.connect(dest||sfxGain); o.start(t); o.stop(t+dur+0.03);
}
function noise(dur,vol,filterType,f0,f1,delay,dest){
  if(!actx) return; const t=actx.currentTime+(delay||0);
  const src=actx.createBufferSource(); src.buffer=NOISE;
  const flt=actx.createBiquadFilter(); flt.type=filterType;
  flt.frequency.setValueAtTime(f0,t); flt.frequency.exponentialRampToValueAtTime(Math.max(20,f1),t+dur);
  const g2=actx.createGain(); g2.gain.setValueAtTime(vol,t); g2.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(flt); flt.connect(g2); g2.connect(dest||sfxGain); src.start(t); src.stop(t+dur+0.02);
}
const sfx={
  enemyDeath(){ tone(140,'square',0.18,0.25,60); noise(0.16,0.22,'lowpass',900,180); },
  hurt(){ tone(190,'sawtooth',0.18,0.22,85); },
  chest(){ [660,880,1175].forEach((f,i)=>tone(f,'sine',0.18,0.13,null,i*0.06)); },
  potion(){ [320,270,235].forEach((f,i)=>tone(f,'sine',0.13,0.18,f*0.8,i*0.08)); },
  equipWeapon(){ noise(0.22,0.18,'highpass',2200,6500); tone(900,'sawtooth',0.12,0.06,1700); },
  equipArmor(){ tone(420,'square',0.1,0.16,300); tone(540,'square',0.1,0.12,360,0.06); noise(0.08,0.1,'bandpass',1300,1300); },
  levelUp(){ [523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.32,0.16,null,i*0.09)); },
  descend(){ noise(0.5,0.22,'lowpass',1400,200); tone(230,'sine',0.42,0.09,90); },
  fireball(){ noise(0.55,0.38,'lowpass',2200,120); tone(80,'sine',0.55,0.32,38); },
  trap(){ tone(1500,'square',0.05,0.18,420); noise(0.05,0.13,'highpass',3200,3200); },
  gameOver(){ tone(220,'sawtooth',1.6,0.26,48); tone(150,'sine',1.9,0.18,38,0.12); },
  victory(){ [523,659,784,1047].forEach((f,i)=>tone(f,'square',0.24,0.16,null,i*0.12));
             [523,659,784].forEach(f=>tone(f,'sawtooth',0.9,0.12,null,0.55)); },
  step(){ const p=0.9+Math.random()*0.25; tone(108*p,'sine',0.07,0.09,72*p); noise(0.04,0.04,'lowpass',500,200); },
  roar(){ tone(120,'sawtooth',0.9,0.32,52); tone(72,'square',0.95,0.2,42,0.02); noise(0.85,0.2,'lowpass',850,140); },
};
function startMusic(){
  if(!actx||musicOn) return; musicOn=true;
  // bass drone layer
  [55,55.4,82.6].forEach(f=>{
    const o=actx.createOscillator(), g2=actx.createGain(), flt=actx.createBiquadFilter();
    o.type='sawtooth'; o.frequency.value=f; flt.type='lowpass'; flt.frequency.value=210; g2.gain.value=0.084;
    o.connect(flt); flt.connect(g2); g2.connect(musicGain); o.start();
  });
  const scale=[220,247,262,294,330,392,440];
  const melody=()=>{ if(!musicOn) return; if(chance(0.75)){ const f=choice(scale)*(chance(0.25)?0.5:1); tone(f,'triangle',1.6,0.09,null,0,musicGain); }
    mTimers.push(setTimeout(melody, 1100+Math.random()*1600)); };
  const distant=()=>{ if(!musicOn) return; tone(40+Math.random()*30,'sine',3.2,0.15,null,0,musicGain); noise(2.6,0.12,'lowpass',300,90,0,musicGain);
    mTimers.push(setTimeout(distant, 9000+Math.random()*9000)); };

function enemyCount(floor){

// shop price multiplier: a touch higher on the mid floors
function priceMult(floor){ return floor>=4&&floor<=6 ? 1.55 : (floor>=7 ? 1.45 : 1.3); }
const floorWeapon=f=> f<=2?WEAPONS.dagger : f<=4?WEAPONS.sword : f<=7?WEAPONS.axe : WEAPONS.staff;

let itemCounter=0;

/* =========================================================
   GAME STATE
   ========================================================= */
let grid, rooms, enemies, itemsOnFloor, player, visible, explored, shopStock;
let floor, bossDead, over, overReason, overAt, logs, paused, pendingLevels;
const MAXFLOOR=10, BOSSFLOOR=10, MINREG=5, MINROOM=3, MAXROOM=7, FIRE_RADIUS=4;
function log(m){ logs.push(m); if(logs.length>5) logs.shift(); }

// timing / camera
let animT=0, lastTs=0, mapDirty=false, uiOpen=false, awaitingPay=false;
let shakeUntil=0, shakeMag=0;
function shake(mag,ms){ shakeUntil=performance.now()+ms; shakeMag=mag; }

// animation effects
const tweens={}; const TWEEN_MS=110;
let floatTexts=[], deaths=[], particles=[], fireballs=[], bloods=[];
function tweenMove(id,fx2,fy2,tx,ty){ tweens[id]={fx:fx2,fy:fy2,tx,ty,t0:performance.now()}; }
function visOf(id,lx,ly){
  const tw=tweens[id]; if(!tw) return [lx,ly];
  const p=(performance.now()-tw.t0)/TWEEN_MS;
  if(p>=1){ delete tweens[id]; return [tw.tx,tw.ty]; }
  const e=p*p*(3-2*p);
  return [tw.fx+(tw.tx-tw.fx)*e, tw.fy+(tw.ty-tw.fy)*e];
}
function floatText(x,y,text,color){ floatTexts.push({x,y,text,color,t0:performance.now(),dur:950,vx:(Math.random()*2-1)*0.5}); }
function spawnDeath(e){ deaths.push({x:e.position.x,y:e.position.y,name:e.name,t0:performance.now(),dur:700,flip:chance(0.5)}); }
function spawnBlood(x,y){ bloods.push({x,y,t0:performance.now(),dur:16000,seed:Math.random()*99,n:5+rndInt(0,4)}); }
function burst(cx,cy,n,color,spread,life){
  for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, sp=spread*(0.4+Math.random()*0.6);
    particles.push({ox:cx,oy:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.4,t0:performance.now(),dur:life||750,color,size:2+Math.random()*2.4}); }
}
function spawnFireball(x,y,r){ fireballs.push({x,y,r,t0:performance.now(),dur:320}); }
function clearEffects(){ floatTexts=[]; deaths=[]; particles=[]; fireballs=[]; bloods=[]; for(const k in tweens) delete tweens[k]; }

/* =========================================================
   BSP GENERATION
   ========================================================= */
function splitRegion(r){
  const canV=r.w>=2*MINREG+1, canH=r.h>=2*MINREG+1;
  if(!canV && !canH) return null;
  const vert=(canV&&canH)?chance(0.5):canV;
  if(vert){ const cut=rndInt(MINREG,r.w-MINREG); return [{x:r.x,y:r.y,w:cut,h:r.h},{x:r.x+cut,y:r.y,w:r.w-cut,h:r.h}]; }
  const cut=rndInt(MINREG,r.h-MINREG); return [{x:r.x,y:r.y,w:r.w,h:cut},{x:r.x,y:r.y+cut,w:r.w,h:r.h-cut}];
}
function carveH(x1,x2,y){ for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++) if(grid[y][x]==='#') grid[y][x]='.'; }
function carveV(y1,y2,x){ for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++) if(grid[y][x]==='#') grid[y][x]='.'; }
function connectRooms(a,b){
  if(chance(0.5)){ carveH(a.cx,b.cx,a.cy); carveV(a.cy,b.cy,b.cx); }
  else { carveV(a.cy,b.cy,a.cx); carveH(a.cx,b.cx,b.cy); }
}
const inRoom=(x,y)=>rooms.some(r=>x>=r.x&&x<r.x+r.w&&y>=r.y&&y<r.y+r.h);
function placeDoors(){
  for(let y=1;y<N-1;y++)for(let x=1;x<N-1;x++){
    if(grid[y][x]!=='.'||inRoom(x,y)) continue;
    const hWall=grid[y][x-1]==='#'&&grid[y][x+1]==='#';
    const vWall=grid[y-1][x]==='#'&&grid[y+1][x]==='#';
    if(hWall===vWall) continue;
    if([[0,-1],[0,1],[-1,0],[1,0]].some(([dx,dy])=>inRoom(x+dx,y+dy)) && chance(0.30)) grid[y][x]='D';
  }
}
function buildBSP(){
  grid=Array.from({length:N},()=>Array(N).fill('#'));
  let regions=[{x:1,y:1,w:N-2,h:N-2}]; const target=rndInt(8,14); let guard=0;
  while(regions.length<target && guard++<80){
    const sp=regions.filter(r=>r.w>=2*MINREG+1||r.h>=2*MINREG+1);
    if(!sp.length) break; sp.sort((a,b)=>b.w*b.h-a.w*a.h);
    const parts=splitRegion(sp[0]); if(!parts) break;
    regions.splice(regions.indexOf(sp[0]),1,...parts);
  }
  rooms=regions.map(r=>{
    const rw=rndInt(MINROOM,Math.max(MINROOM,Math.min(MAXROOM,r.w-2)));
    const rh=rndInt(MINROOM,Math.max(MINROOM,Math.min(MAXROOM,r.h-2)));
    const rx=r.x+1+rndInt(0,Math.max(0,r.w-2-rw));
    const ry=r.y+1+rndInt(0,Math.max(0,r.h-2-rh));
    for(let y=ry;y<ry+rh;y++)for(let x=rx;x<rx+rw;x++) grid[y][x]='.';
    return {x:rx,y:ry,w:rw,h:rh,cx:rx+(rw>>1),cy:ry+(rh>>1)};
  });
  for(let i=1;i<rooms.length;i++) connectRooms(rooms[i-1],rooms[i]);
  placeDoors();
}
function freeFloorCells(){
  const out=[];
  for(let y=0;y<N;y++)for(let x=0;x<N;x++)
    if(grid[y][x]==='.'&&!(x===player.x&&y===player.y)&&!enemyAt(x,y)) out.push([x,y]);
  return out;
}
function placeChests(){
  let n = floor===BOSSFLOOR ? rndInt(2,3) : (floor===1 ? 2 : 1+Math.floor(floor/3));
  const c=shuffle(freeFloorCells()); for(let i=0;i<n&&c.length;i++){const[x,y]=c.pop(); grid[y][x]='C';}
}
function placeTraps(){
  let n = floor===BOSSFLOOR ? 0 : floor;
  if(floor>=4&&floor<=6) n+=2;          // traps more frequent on mid floors
  const c=shuffle(freeFloorCells()); for(let i=0;i<n&&c.length;i++){const[x,y]=c.pop(); grid[y][x]='T';}
}
function placeShop(){
  const cells=freeFloorCells().filter(([x,y])=>inRoom(x,y));
  const list=cells.length?cells:freeFloorCells();
  if(list.length){ const[x,y]=choice(list); grid[y][x]='S'; }
  const pool=shuffle([floorWeapon(floor),floorArmor(floor),POTIONS.strong,POTIONS.health,...SCROLLS]);
  const mult=priceMult(floor);
  shopStock=pool.slice(0,3).map(t=>({tmpl:t,name:t.name,type:t.type,effect:t.effect,price:Math.round(t.value*mult),sold:false}));
}
function mkEnemy(t,id,x,y){ return {id,name:t.name,position:{x,y},hp:t.hp,max_hp:t.hp,attack:t.attack,defense:t.defense,
  xp_reward:t.xp,gold_min:t.gmin,gold_max:t.gmax, facing:'s',seed:Math.random()*6.28, attackUntil:0,hurtUntil:0,roared:false}; }
function spawnEnemies(){
  const c=shuffle(freeFloorCells()); let n,pool;
  if(floor===BOSSFLOOR){ n=1; pool=[ENEMIES.dragon]; } else { n=enemyCount(floor); pool=enemyPool(floor); }
  for(let i=0;i<n&&c.length;i++){ const[x,y]=c.pop(); enemies.push(mkEnemy(choice(pool),'enemy_'+(i+1),x,y)); }
}
function genFloor(fl,arrival){
  floor=fl; enemies=[]; itemsOnFloor=[]; explored=new Set(); clearEffects();
  buildBSP();
  const spawn={x:rooms[0].cx,y:rooms[0].cy};
  let far=rooms[0],bd=-1;
  for(const r of rooms){ const d=Math.abs(r.cx-spawn.x)+Math.abs(r.cy-spawn.y); if(d>bd){bd=d;far=r;} }
  const down={x:far.cx,y:far.cy};
  if(floor<MAXFLOOR) grid[down.y][down.x]='>';
  if(floor>1) grid[spawn.y][spawn.x]='<';
  const p=arrival==='up'?down:spawn; player.x=p.x; player.y=p.y;
  placeShop(); placeChests(); placeTraps(); spawnEnemies();
  computeFOV(); mapDirty=true;
}

/* =========================================================
   FOV
   ========================================================= */
function lineTiles(x0,y0,x1,y1){
  const pts=[]; const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  const sx=x0<x1?1:-1,sy=y0<y1?1:-1; let err=dx-dy,x=x0,y=y0;
  while(true){ pts.push([x,y]); if(x===x1&&y===y1)break; const e2=2*err; if(e2>-dy){err-=dy;x+=sx;} if(e2<dx){err+=dx;y+=sy;} }
  return pts;
}
function losClear(x0,y0,x1,y1){ const p=lineTiles(x0,y0,x1,y1); for(let i=1;i<p.length-1;i++){const[x,y]=p[i]; if(grid[y][x]==='#') return false;} return true; }
function computeFOV(){
  visible=new Set();
  for(let dx=-5;dx<=5;dx++)for(let dy=-5;dy<=5;dy++){
    if(Math.max(Math.abs(dx),Math.abs(dy))>5) continue;
    const x=player.x+dx,y=player.y+dy;
    if(x<0||y<0||x>=N||y>=N) continue;
    if(losClear(player.x,player.y,x,y)){ const k=x+','+y; visible.add(k); explored.add(k); }
  }
}

/* =========================================================
   COMBAT
   ========================================================= */
function faceFrom(dx,dy){ return Math.abs(dx)>=Math.abs(dy)?(dx>0?'e':'w'):(dy>0?'s':'n'); }
function attackRoll(atk,def){
  let raw=atk-def; if(raw<1) raw=1;
  if(chance(0.10)) return {dmg:0,miss:true,crit:false};
  let crit=false; if(chance(0.10)){ raw*=2; crit=true; }
  return {dmg:Math.max(1,Math.round(raw)),miss:false,crit};
}
function enemyAt(x,y){ return enemies.find(e=>e.position.x===x&&e.position.y===y); }
function recalc(){
  player.bonus_attack = player.equipped.weapon ? player.equipped.weapon.effect.attack : 0;
  player.bonus_defense = player.equipped.armor ? player.equipped.armor.effect.defense : 0;
  player.attack = player.base_attack + player.bonus_attack;
  player.defense = player.base_defense + player.bonus_defense;
  player.maxSlots = 10 + (player.equipped.backpack?10:0);
}
function hasAnyBackpack(){ return player.equipped.backpack || player.inventory.some(i=>i.type==='backpack'); }
function toggleEquip(it){
  const slot=it.type==='weapon'?'weapon':it.type==='armor'?'armor':'backpack';
  if(player.equipped[slot]===it){
    if(slot==='backpack' && player.inventory.length>10){ log('Empty your backpack before removing it.'); return finishTurn(true); }
    player.equipped[slot]=null; recalc(); log(`You unequip ${it.name}.`);
  } else {
    player.equipped[slot]=it; recalc(); log(`You equip ${it.name}.`);
  }
  slot==='weapon'?sfx.equipWeapon():sfx.equipArmor();
  return finishTurn(true);
}
// smoother curve: thresholds 7,10,13,16,19,... (4 + level*3); carries leftover xp
function gainXp(n){
  player.xp+=n;
  while(player.xp>=player.xp_to_next){
    player.xp-=player.xp_to_next; player.level++; player.xp_to_next=4+player.level*3;
    pendingLevels++; sfx.levelUp(); burst(player.x+0.5,player.y+0.5,26,'#e2b93d',2.6,900);
    log(`Level up! You reached level ${player.level}.`);
  }
}
function killEnemy(e){
  const i=enemies.indexOf(e); if(i<0) return;
  spawnDeath(e); spawnBlood(e.position.x,e.position.y); sfx.enemyDeath();
  enemies.splice(i,1); player.kills++;
  log(`${e.name} dies.`); gainXp(e.xp_reward);
  const g2=rndInt(e.gold_min,e.gold_max); if(g2>0){ player.gold+=g2; log(`+${g2} gold.`); }
  const r=rnd(); let drop=null; const potionChance=floor>=5?0.35:0.25;
  if(r<potionChance) drop=mkItem(rollPotion(floor));
  else if(r<potionChance+0.06) drop=chance(0.5)?mkItem(floorWeapon(floor)):mkItem(floorArmor(floor));
  if(drop){ itemsOnFloor.push({...drop,position:{x:e.position.x,y:e.position.y}}); log(`${e.name} drops ${drop.name}.`); }
  if(e.name==='Dragon'){ bossDead=true; sfx.roar(); victory(); }
}
function playerAttack(e){
  const now=performance.now(); player.attackUntil=now+260;
  const {dmg,miss,crit}=attackRoll(player.attack,e.defense);
  if(miss){ log(`You miss the ${e.name}.`); floatText(e.position.x,e.position.y,'miss','#bbb'); }
  else { e.hp-=dmg; e.hurtUntil=now+200; log(`You hit ${e.name} for ${dmg}${crit?' (CRIT!)':''}.`);
    floatText(e.position.x,e.position.y,'-'+dmg,crit?'#ffe14d':'#ffd34d'); }
  if(e.hp<=0) killEnemy(e);
}
function enemyAttack(e){
  const now=performance.now(); e.attackUntil=now+260; e.facing=faceFrom(player.x-e.position.x,player.y-e.position.y);
  const {dmg,miss,crit}=attackRoll(e.attack,player.defense);
  if(miss){ log(`${e.name} misses you.`); }
  else { player.hp-=dmg; player.hurtUntil=now+220; shake(crit?9:6,240); log(`${e.name} hits you for ${dmg}${crit?' (CRIT!)':''}.`);
    floatText(player.x,player.y,'-'+dmg,'#ff5555'); sfx.hurt(); }
  if(player.hp<=0) gameOver(`You have been slain by ${e.name} on floor ${floor}.`);
}

/* =========================================================
   ENEMY AI
   ========================================================= */
const enemyWalkable=(x,y)=>{ const ch=grid[y][x]; return ch!=='#'&&ch!=='C'&&ch!=='D'; };
function enemyTurn(){
  for(const e of enemies){
    if(over) return;
    const dx=player.x-e.position.x, dy=player.y-e.position.y;
    const cheb=Math.max(Math.abs(dx),Math.abs(dy));
    if(cheb>6) continue;
    if(e.name==='Dragon' && !e.roared){ e.roared=true; sfx.roar(); shake(5,300); log('The Dragon ROARS!'); }
    e.facing=faceFrom(dx,dy);
    if(Math.abs(dx)+Math.abs(dy)===1){ enemyAttack(e); continue; }
    const steps=[]; const sx=Math.sign(dx),sy=Math.sign(dy);
    if(Math.abs(dx)>=Math.abs(dy)){ if(sx) steps.push([sx,0]); if(sy) steps.push([0,sy]); }
    else { if(sy) steps.push([0,sy]); if(sx) steps.push([sx,0]); }
    for(const[mx,my] of steps){
      const nx=e.position.x+mx, ny=e.position.y+my;
      if(nx===player.x&&ny===player.y){ enemyAttack(e); break; }
      if(enemyAt(nx,ny)) continue;
      const ch=grid[ny][nx];
      if(ch==='D'){ grid[ny][nx]='d'; mapDirty=true; break; }
      if(enemyWalkable(nx,ny)){ const ox=e.position.x,oy=e.position.y; e.position.x=nx; e.position.y=ny; tweenMove(e.id,ox,oy,nx,ny); break; }
    }
  }
}

/* =========================================================
   ACTIONS
   ========================================================= */
function giveOrDrop(it,x,y){
  if(player.inventory.length<player.maxSlots){ player.inventory.push(it); log(`Found ${it.name}.`); }
  else { itemsOnFloor.push({...it,position:{x,y}}); log(`${it.name} drops to the floor.`); }
}
function openChest(x,y){
  grid[y][x]='c'; mapDirty=true; log('You open the chest.'); sfx.chest(); burst(x+0.5,y+0.4,16,'#e2b93d',1.9,800);
  if(!hasAnyBackpack() && chance(0.015)){ giveOrDrop(mkItem(BACKPACK),x,y); log('A sturdy Backpack!'); }
  const count=rndInt(1,3);
  for(let i=0;i<count;i++){
    const r=rnd();
    if(r<0.40) giveOrDrop(rollPotion(floor),x,y);
    else if(r<0.60) giveOrDrop(mkItem(floorWeapon(floor)),x,y);
    else if(r<0.80) giveOrDrop(mkItem(floorArmor(floor)),x,y);
    else if(r<0.90) giveOrDrop(mkItem(choice(SCROLLS)),x,y);
    else { const g2=rndInt(floor*5,floor*15); player.gold+=g2; log(`Found ${g2} gold.`); }
  }
}
function move(dx,dy){
  if(!grid||over||paused) return;
  player.facing=faceFrom(dx,dy);
  const nx=player.x+dx, ny=player.y+dy;
  if(nx<0||ny<0||nx>=N||ny>=N){ log('Blocked by wall.'); return finishTurn(true); }
  const e=enemyAt(nx,ny), ch=grid[ny][nx];
  if(e){ playerAttack(e); }
  else if(ch==='#'){ log('Blocked by wall.'); }
  else if(ch==='D'){ grid[ny][nx]='d'; mapDirty=true; log('You open the door.'); }
  else if(ch==='C'){ openChest(nx,ny); }
  else {
    const ox=player.x, oy=player.y; player.x=nx; player.y=ny; tweenMove('player',ox,oy,nx,ny); sfx.step();
    if(ch==='T'){ grid[ny][nx]='t'; mapDirty=true; const d=floor*2; player.hp-=d; shake(7,250); log(`A hidden trap! You take ${d} damage.`); sfx.trap(); floatText(nx,ny,'-'+d,'#ff5555');
      if(player.hp<=0){ gameOver(`You have been slain by a trap on floor ${floor}.`); return finishTurn(false); } }
    else if(ch==='S'){ log('A merchant beckons. Press E to shop.'); }
    const it=itemsOnFloor.find(i=>i.position.x===nx&&i.position.y===ny);
    if(it) log(`There is a ${it.name} here.`);
  }
  finishTurn(true);
}
function wait(){ if(!grid||over||paused) return; log('You wait.'); finishTurn(true); }
function pickUp(){
  if(!grid||over||paused) return;
  const it=itemsOnFloor.find(i=>i.position.x===player.x&&i.position.y===player.y);
  if(!it) log('Nothing to pick up.');
  else if(player.inventory.length>=player.maxSlots) log(`Inventory full (${player.maxSlots}/${player.maxSlots}).`);
  else { itemsOnFloor.splice(itemsOnFloor.indexOf(it),1); const {position,...rest}=it; player.inventory.push(rest); log(`You pick up ${rest.name}.`); }
  finishTurn(true);
}
function dropItem(id){
  if(over||paused) return;
  const idx=player.inventory.findIndex(i=>i.id===id);
  if(idx<0){ log('Item not found.'); return finishTurn(true); }
  const it=player.inventory[idx];
  if(it===player.equipped.backpack){
    if(player.inventory.length-1>10){ log('Empty your backpack before dropping it.'); return finishTurn(true); }
    player.equipped.backpack=null;
  }
  if(it===player.equipped.weapon) player.equipped.weapon=null;
  if(it===player.equipped.armor) player.equipped.armor=null;
  player.inventory.splice(idx,1); recalc();
  itemsOnFloor.push({...it,position:{x:player.x,y:player.y}}); log(`You drop ${it.name}.`);
  finishTurn(true);
}
function useItem(id){
  if(over||paused) return;
  const idx=player.inventory.findIndex(i=>i.id===id);
  if(idx<0){ log('Item not found.'); return finishTurn(true); }
  const it=player.inventory[idx];
  if(it.type==='weapon'||it.type==='armor'||it.type==='backpack'){ return toggleEquip(it); }
  player.inventory.splice(idx,1);
  if(it.type==='potion'){
    if(it.effect.heal){ player.hp=Math.min(player.max_hp,player.hp+it.effect.heal); log(`You drink ${it.name}. +${it.effect.heal} HP.`); sfx.potion(); floatText(player.x,player.y,'+'+it.effect.heal,'#5ad469'); burst(player.x+0.5,player.y+0.5,10,'#5ad469',1.2,600); }
    if(it.effect.damage){ player.hp-=it.effect.damage; log(`${it.name}! You take ${it.effect.damage} damage.`); sfx.hurt(); shake(5,200); floatText(player.x,player.y,'-'+it.effect.damage,'#ff5555');
      if(player.hp<=0){ gameOver(`You have been slain by a Poison Flask on floor ${floor}.`); return finishTurn(false); } }
  } else if(it.type==='scroll'){
    if(it.effect.damage_all_enemies){
      const d=it.effect.damage_all_enemies; sfx.fireball(); spawnFireball(player.x,player.y,FIRE_RADIUS); shake(6,260);
      log(`Fireball erupts in a ${FIRE_RADIUS}-tile radius!`); paused=true; setButtons();
      setTimeout(()=>{
        for(const e of [...enemies]){
          const dist=Math.max(Math.abs(e.position.x-player.x),Math.abs(e.position.y-player.y));
          if(dist<=FIRE_RADIUS){ e.hp-=d; e.hurtUntil=performance.now()+200; floatText(e.position.x,e.position.y,'-'+d,'#ffae3a'); if(e.hp<=0) killEnemy(e); }
        }
        paused=false; finishTurn(true);
      }, 320);
      return;
    }
    else if(it.effect.teleport_player_random){ const c=freeFloorCells(); if(c.length){ const[x,y]=choice(c); player.x=x; player.y=y; delete tweens['player']; } log('You blink to a random location.'); }
    else if(it.effect.reveal_all_tiles){ for(let y=0;y<N;y++)for(let x=0;x<N;x++) explored.add(x+','+y); log('The dungeon map is revealed.'); }
    else if(it.effect.identify_item){ log('You sense nothing left to identify.'); }
  }
  finishTurn(true);
}
function descend(){
  if(over||paused||grid[player.y][player.x]!=='>') return;
  if(floor>=MAXFLOOR){ log('This is the deepest floor.'); return finishTurn(true); }
  sfx.descend(); genFloor(floor+1,'down'); log(`You descend to floor ${floor}.`);
  if(floor===BOSSFLOOR) log('A monstrous roar shakes the dungeon...');

}
function ascend(){
  if(over||paused||grid[player.y][player.x]!=='<'||floor<=1) return;

}
// death router: offer resurrection (once per run) before finalizing game over
const RESURRECT_COST=10;
function canResurrect(){ return player && player.resurrected<1; }
function gameOver(reason){
  over=true;                       // stop turn processing immediately
  if(canResurrect()) showDeathChoice(reason);
  else doGameOver(reason);
}
function doGameOver(reason){
  overReason=reason; overAt=performance.now(); log(reason); sfx.gameOver();
  for(let i=0;i<40;i++) burst(player.x+0.5,player.y+0.5,1,'#8a1a14',2.2,1800);
  setTimeout(promptName,1500);
}
function resMsg(t){ const m=$('resMsg'); if(m) m.textContent=t; }
function showDeathChoice(reason){
  paused=true; uiOpen=true;
  const resBtn = tg ? `<button id="resBtn">💀 Resurrect for ⭐ ${RESURRECT_COST} Stars</button>` : '';
  $('modalBox').innerHTML=`<h2 style="color:var(--hp)">YOU DIED</h2>
    <p>${esc(reason)}</p>
    <p style="color:var(--txt)">Floor ${floor} · Lv ${player.level} · ${player.gold}g · ${player.kills} kills</p>
    <div class="choice">${resBtn}<button id="acceptDeath">⚰ Accept Death</button></div>
    <div class="shop-msg" id="resMsg"></div>`;
  if(tg) $('resBtn').onclick=doResurrect;
  $('acceptDeath').onclick=()=>{ $('modal').classList.add('hidden'); uiOpen=false; paused=false; doGameOver(reason); };
  $('modal').classList.remove('hidden');
}
// In production: create an XTR invoice via your bot backend (createInvoiceLink:
//   currency 'XTR', prices [{label:'Resurrection', amount:10}], payload 'resurrect')
//   and assign the returned link to window.RESURRECT_INVOICE_URL.
function doResurrect(){
  if(!tg){ resMsg('Resurrection requires Telegram.'); return; }
  const url=window.RESURRECT_INVOICE_URL;
  if(!url){ resMsg('Payment unavailable: no invoice link configured.'); return; }
  try{
    awaitingPay=true;
    tg.openInvoice(url, status=>{
      awaitingPay=false;
      if(status==='paid') applyResurrect();
      else if(status==='cancelled') resMsg('Payment cancelled.');
      else resMsg('Payment failed.');
    });
  }catch(e){ awaitingPay=false; resMsg('Payment error.'); }
}
function applyResurrect(){
  if(!player || player.resurrected>=1 || overReason) return;   // single use; not after final death
  player.resurrected++; player.hp=Math.max(1,Math.round(player.max_hp*0.5));
  over=false; paused=false; uiOpen=false; $('modal').classList.add('hidden');
  log('You have been resurrected!'); burst(player.x+0.5,player.y+0.5,24,'#5ad469',2.4,1000);
  computeFOV(); refreshUI(); setButtons();
}
function victory(){ over=true; overReason='Victory! You slew the Dragon!'; overAt=performance.now(); log(overReason); sfx.victory();
  for(let i=0;i<50;i++) burst(player.x+0.5,player.y+0.5,1,choice(['#e2b93d','#fff2a0','#5ad469']),2.6,2000);
  setTimeout(promptName,1500); }
function finishTurn(runEnemies){
  if(!over&&runEnemies) enemyTurn();
  computeFOV(); refreshUI(); setButtons();
  if(!over && !paused && pendingLevels>0) showLevelUp();
}
function postFloor(){ computeFOV(); mapDirty=true; refreshUI(); setButtons(); }

// frame-based animation transform
function applyAnim(ent,id,px,py,s){
  const now=performance.now(), cx=px+s/2, cy=py+s/2;
  let ox=0,oy=0,rot=0,sc=1, hurt=false, attackP=0;
  const fv={n:[0,-1],s:[0,1],e:[1,0],w:[-1,0]}[ent.facing||'s'];
  let state='idle';
  if(ent.hurtUntil>now) state='hurt';
  else if(ent.attackUntil>now) state='attack';
  else if(tweens[id]) state='walk';
  if(state==='idle'){ oy=Math.sin(animT*2.4+(ent.seed||0))*s*0.025; sc=1+Math.sin(animT*2.4+(ent.seed||0))*0.02; }
  else if(state==='walk'){ const p=clamp((now-tweens[id].t0)/TWEEN_MS,0,1); oy=-Math.abs(Math.sin(p*Math.PI*2))*s*0.11; rot=Math.sin(p*Math.PI*2)*0.07; }
  else if(state==='attack'){ attackP=1-(ent.attackUntil-now)/260; const l=Math.sin(attackP*Math.PI)*s*0.22; ox=fv[0]*l; oy=fv[1]*l; }
  else if(state==='hurt'){ ox=Math.sin(animT*55)*s*0.05; hurt=true; }
  g.translate(ox,oy); g.translate(cx,cy); g.rotate(rot); g.scale(sc,sc); g.translate(-cx,-cy);
  return {state,hurt,attackP,fv};
}
function drawSlash(px,py,s,fv,p){
  const cx=px+s/2+fv[0]*s*0.3, cy=py+s/2+fv[1]*s*0.3, ang=Math.atan2(fv[1],fv[0]);
  g.save(); g.globalAlpha=Math.sin(p*Math.PI); g.strokeStyle='#fff'; g.lineWidth=3; g.lineCap='round';

}
function drawFire(px,py,s,fv,p){
  const cx=px+s/2+fv[0]*s*0.4, cy=py+s/2+fv[1]*s*0.4, ang=Math.atan2(fv[1],fv[0]);

}

/* =========================================================
   MAP PRERENDER (background layer) + AO
   ========================================================= */
function aoAt(x,y,px,py,s){
  if(grid[y][x]==='#') return;
  const d='rgba(0,0,0,0.42)';
  if(y>0&&grid[y-1][x]==='#'){ const gr=g.createLinearGradient(0,py,0,py+s*0.4); gr.addColorStop(0,d); gr.addColorStop(1,'transparent'); g.fillStyle=gr; g.fillRect(px,py,s,s*0.4); }
  if(y<N-1&&grid[y+1][x]==='#'){ const gr=g.createLinearGradient(0,py+s,0,py+s*0.6); gr.addColorStop(0,d); gr.addColorStop(1,'transparent'); g.fillStyle=gr; g.fillRect(px,py+s*0.6,s,s*0.4); }
  if(x>0&&grid[y][x-1]==='#'){ const gr=g.createLinearGradient(px,0,px+s*0.4,0); gr.addColorStop(0,d); gr.addColorStop(1,'transparent'); g.fillStyle=gr; g.fillRect(px,py,s*0.4,s); }
  if(x<N-1&&grid[y][x+1]==='#'){ const gr=g.createLinearGradient(px+s,0,px+s*0.6,0); gr.addColorStop(0,d); gr.addColorStop(1,'transparent'); g.fillStyle=gr; g.fillRect(px+s*0.6,py,s*0.4,s); }
}
function renderMap(){
  const prev=g; g=mapCtx;
  mapCtx.fillStyle='#06060a'; mapCtx.fillRect(0,0,N*TILE,N*TILE);
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){ const px=x*TILE,py=y*TILE; drawTile(grid[y][x],px,py,TILE); aoAt(x,y,px,py,TILE); }
  g=prev; mapDirty=false;
}

/* =========================================================
   FX LAYER + LIGHTING (render loop)
   ========================================================= */
function drawFX(){
  g=fxctx; fxctx.clearRect(0,0,CW,CH);
  if(!grid){ bgctx.fillStyle='#06060a'; bgctx.fillRect(0,0,CW,CH); return; }
  if(mapDirty) renderMap();
  const now=performance.now();
  const [pvx,pvy]=visOf('player',player.x,player.y);
  const camX=clamp(pvx-(VW-1)/2,0,N-VW), camY=clamp(pvy-(VH-1)/2,0,N-VH);
  const camPX=camX*TILE, camPY=camY*TILE;
  const SX=x=>x*TILE-camPX, SY=y=>y*TILE-camPY;

  // background blit (camera-cropped prerendered map)
  bgctx.clearRect(0,0,CW,CH);
  bgctx.drawImage(mapCanvas, camPX,camPY,CW,CH, 0,0,CW,CH);

  // blood (under entities)
  bloods=bloods.filter(b=>now-b.t0<b.dur);
  for(const b of bloods){ const p=(now-b.t0)/b.dur; if(!visible.has(b.x+','+b.y)) continue;
    g.save(); g.globalAlpha=0.55*(1-p); g.fillStyle='#7a120c'; const cx=SX(b.x+0.5),cy=SY(b.y+0.55);
    for(let i=0;i<b.n;i++){ const a=b.seed+i*2.1; const rr=TILE*(0.12+0.06*((i*7+b.seed)%3));
      g.beginPath(); g.arc(cx+Math.cos(a)*TILE*0.22,cy+Math.sin(a)*TILE*0.16, rr,0,7); g.fill(); } g.restore(); }

  // items (animated)
  for(const it of itemsOnFloor){ const{x,y}=it.position; if(!visible.has(x+','+y)) continue;
    g.save();
    if(it.type==='potion'){ g.translate(0,Math.sin(animT*3+x)*TILE*0.06); }
    else if(it.type==='scroll'){ const cx=SX(x)+TILE/2,cy=SY(y)+TILE/2; g.translate(cx,cy); g.rotate(animT*0.8); g.translate(-cx,-cy); }
    drawItemIcon(it,SX(x),SY(y),TILE); g.restore();
  }

  // death animations (fall + fade)
  deaths=deaths.filter(d=>now-d.t0<d.dur);
  for(const d of deaths){ const p=(now-d.t0)/d.dur; const px=SX(d.x),py=SY(d.y),cx=px+TILE/2,cy=py+TILE/2;
    g.save(); g.globalAlpha=1-p; g.translate(cx,cy+p*TILE*0.18); g.rotate(p*1.3*(d.flip?1:-1)); g.translate(-cx,-cy);
    drawEnemySprite(d.name,px,py,TILE); g.globalAlpha=(1-p)*0.5; g.fillStyle='#e2483d'; g.fillRect(px,py,TILE,TILE); g.restore(); }

  // enemies
  const FV={n:[0,-1],s:[0,1],e:[1,0],w:[-1,0]};
  for(const e of enemies){ const k=e.position.x+','+e.position.y; if(!visible.has(k)) continue;
    const [ex,ey]=visOf(e.id,e.position.x,e.position.y);
    if(e.name==='Dragon'){                              // boss is rendered 3x3 tiles, centered on its tile
      const DS=TILE*3, dpx=SX(ex)+TILE/2-DS/2, dpy=SY(ey)+TILE/2-DS/2, now=performance.now();
      g.save();
      const bob=Math.sin(animT*2)*TILE*0.06; g.translate(0,bob);
      spDragon(dpx,dpy,DS);
      if(e.attackUntil>now){ const ap=1-(e.attackUntil-now)/260; drawFire(dpx,dpy,DS,FV[e.facing||'s'],ap); }
      if(e.hurtUntil>now){ g.globalAlpha=0.32; g.fillStyle='#e2483d'; g.fillRect(dpx+DS*0.2,dpy+DS*0.2,DS*0.6,DS*0.6); g.globalAlpha=1; }
      g.restore();
      const bw=TILE*1.6, bx=SX(ex)+TILE/2-bw/2, by=SY(ey)-TILE*0.95;
      g.fillStyle='#000'; g.fillRect(bx,by,bw,6); g.fillStyle='#e2483d'; g.fillRect(bx,by,bw*Math.max(0,e.hp/e.max_hp),6);
      continue;
    }
    const px=SX(ex),py=SY(ey);
    g.save(); const a=applyAnim(e,e.id,px,py,TILE);
    drawEnemySprite(e.name,px,py,TILE);
    if(a.hurt){ g.globalAlpha=0.4; g.fillStyle='#e2483d'; g.fillRect(px,py,TILE,TILE); g.globalAlpha=1; }
    g.restore();
    if(e.hp<e.max_hp){ g.fillStyle='#000'; g.fillRect(px+TILE*0.18,py+TILE*0.04,TILE*0.64,4);
      g.fillStyle='#e2483d'; g.fillRect(px+TILE*0.18,py+TILE*0.04,TILE*0.64*Math.max(0,e.hp/e.max_hp),4); } }

  // player
  { const px=SX(pvx),py=SY(pvy); g.save(); const a=applyAnim(player,'player',px,py,TILE);
    spPlayer(px,py,TILE);
    if(a.hurt){ g.globalAlpha=0.4; g.fillStyle='#e2483d'; g.fillRect(px,py,TILE,TILE); g.globalAlpha=1; }
    if(a.state==='attack') drawSlash(px,py,TILE,a.fv,a.attackP);
    g.restore(); }

  // ---- LIGHTING: fog of war + torch (per-tile darkness) ----
  const flick=0.92+Math.sin(animT*9)*0.05+Math.sin(animT*23)*0.03;
  const torchR=5.1*flick;
  const lpx=pvx+0.5, lpy=pvy+0.5;
  const x0=Math.floor(camX), y0=Math.floor(camY);
  for(let y=y0;y<=y0+VH;y++)for(let x=x0;x<=x0+VW;x++){
    if(x<0||y<0||x>=N||y>=N) continue;
    const k=x+','+y, px=SX(x),py=SY(y);
    if(!explored.has(k)){ g.fillStyle='#04040a'; g.fillRect(px,py,TILE+1,TILE+1); continue; }
    if(!visible.has(k)){ g.fillStyle='rgba(8,11,26,0.62)'; g.fillRect(px,py,TILE+1,TILE+1); continue; }
    const dist=Math.hypot(x+0.5-lpx, y+0.5-lpy);
    const t=clamp(dist/torchR,0,1); const dark=t*t*0.82;
    if(dark>0.01){ g.fillStyle='rgba(4,5,12,'+dark.toFixed(3)+')'; g.fillRect(px,py,TILE+1,TILE+1); }
  }
  // warm torch glow
  const tcx=SX(lpx), tcy=SY(lpy), tr=torchR*TILE;
  g.save(); g.globalCompositeOperation='lighter';
  const tg=g.createRadialGradient(tcx,tcy,0,tcx,tcy,tr);
  tg.addColorStop(0,'rgba(255,170,80,'+(0.22*flick).toFixed(3)+')');
  tg.addColorStop(0.45,'rgba(255,120,40,0.10)'); tg.addColorStop(1,'rgba(255,80,20,0)');
  g.fillStyle=tg; g.fillRect(0,0,CW,CH); g.restore();

  // fireball glow (above lighting)
  fireballs=fireballs.filter(fb=>now-fb.t0<fb.dur);
  for(const fb of fireballs){ const p=(now-fb.t0)/fb.dur; const cx=SX(fb.x+0.5),cy=SY(fb.y+0.5); const rad=Math.max(1,(fb.r+0.5)*TILE*p);
    g.save(); g.globalCompositeOperation='lighter';
    const grd=g.createRadialGradient(cx,cy,0,cx,cy,rad);
    grd.addColorStop(0,'rgba(255,235,150,'+(0.7*(1-p))+')'); grd.addColorStop(0.55,'rgba(255,140,40,'+(0.5*(1-p))+')'); grd.addColorStop(1,'rgba(255,60,20,0)');
    g.fillStyle=grd; g.beginPath(); g.arc(cx,cy,rad,0,7); g.fill();
    g.strokeStyle='rgba(255,190,90,'+(1-p)+')'; g.lineWidth=2; g.beginPath(); g.arc(cx,cy,rad,0,7); g.stroke(); g.restore(); }

  // ---- VIGNETTE (post-processing) ----
  const hpFrac=clamp(player.hp/player.max_hp,0,1);
  const vigA=0.34+(1-hpFrac)*0.5;
  const vg=g.createRadialGradient(CW/2,CH/2,CW*0.22,CW/2,CH/2,CW*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,'+vigA.toFixed(3)+')');
  g.fillStyle=vg; g.fillRect(0,0,CW,CH);
  if(hpFrac<0.3){ const rp=(0.3-hpFrac)*1.6*(0.6+0.4*Math.sin(animT*5));
    const rg=g.createRadialGradient(CW/2,CH/2,CW*0.18,CW/2,CH/2,CW*0.7);
    rg.addColorStop(0,'rgba(120,0,0,0)'); rg.addColorStop(1,'rgba(150,0,0,'+clamp(rp,0,0.5).toFixed(3)+')');
    g.fillStyle=rg; g.fillRect(0,0,CW,CH); }

  // particles (above vignette)
  particles=particles.filter(pt=>now-pt.t0<pt.dur);
  for(const pt of particles){ const el=(now-pt.t0)/1000, p=(now-pt.t0)/pt.dur;
    const ex=pt.ox+pt.vx*el, ey=pt.oy+pt.vy*el+1.0*el*el; const cx=SX(ex),cy=SY(ey);
    g.globalAlpha=1-p; g.fillStyle=pt.color; g.beginPath(); g.arc(cx,cy,pt.size*(1-p*0.5),0,7); g.fill(); g.globalAlpha=1; }

  // floating damage numbers (arc up)
  floatTexts=floatTexts.filter(ft=>now-ft.t0<ft.dur);
  g.textAlign='center'; g.textBaseline='middle'; g.font='bold 16px monospace';
  for(const ft of floatTexts){ const p=(now-ft.t0)/ft.dur; const el=(now-ft.t0)/1000;
    const cx=SX(ft.x+0.5)+ft.vx*el*TILE, cy=SY(ft.y+0.25)-Math.sin(Math.min(p,1)*1.1)*36;
    g.globalAlpha=1-p*p; g.lineWidth=3; g.strokeStyle='rgba(0,0,0,0.75)'; g.strokeText(ft.text,cx,cy);
    g.fillStyle=ft.color; g.fillText(ft.text,cx,cy); g.globalAlpha=1; }

  drawMinimap();
  if(over) drawOverlay(now);
}
function drawMinimap(){
  const M=80, cell=M/N, ox=CW-M-10, oy=10;
  g.save(); g.fillStyle='rgba(6,6,10,0.85)'; g.fillRect(ox-3,oy-3,M+6,M+6);
  g.strokeStyle='#2c2c40'; g.lineWidth=1; g.strokeRect(ox-3,oy-3,M+6,M+6);
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){ const k=x+','+y; if(!explored.has(k)) continue;
    const ch=grid[y][x]; let c='#3a3a4f';
    if(ch==='#') c='#22222e'; else if(ch==='>'||ch==='<'||ch==='S') c='#e2b93d'; else if(ch==='C') c='#c08a2a';
    g.globalAlpha=visible.has(k)?0.95:0.45; g.fillStyle=c; g.fillRect(ox+x*cell,oy+y*cell,Math.ceil(cell),Math.ceil(cell)); }
  g.globalAlpha=1; g.fillStyle='#e2483d';
  for(const e of enemies){ if(visible.has(e.position.x+','+e.position.y)) g.fillRect(ox+e.position.x*cell,oy+e.position.y*cell,Math.ceil(cell),Math.ceil(cell)); }
  g.fillStyle='#5ad469'; g.fillRect(ox+player.x*cell-1,oy+player.y*cell-1,cell+2,cell+2);
  g.restore();
}
function drawOverlay(now){
  const a=clamp((now-overAt)/1300,0,1), win=overReason.startsWith('Victory');
  g.fillStyle='rgba(4,4,8,'+(0.82*a)+')'; g.fillRect(0,0,CW,CH);
  g.globalAlpha=a; g.textAlign='center'; g.textBaseline='middle';
  g.save(); g.shadowColor=win?'#5ad469':'#e2483d'; g.shadowBlur=24;
  g.fillStyle=win?'#5ad469':'#e2483d'; g.font='bold 44px monospace';
  g.fillText(win?'VICTORY':'YOU DIED', CW/2, CH/2-34); g.restore();
  g.fillStyle='#cfcfe0'; g.font='15px monospace'; wrapText(overReason, CW/2, CH/2+22, CW-90, 22);
  g.fillStyle='#9d7bff'; g.font='13px monospace'; g.fillText('Press New Game to play again', CW/2, CH/2+92);
  g.globalAlpha=1;
}
function wrapText(t,cx,y,maxW,lh){
  const words=t.split(' '); let lineStr='', yy=y;
  for(const w of words){ const test=lineStr?lineStr+' '+w:w;
    if(g.measureText(test).width>maxW && lineStr){ g.fillText(lineStr,cx,yy); lineStr=w; yy+=lh; } else lineStr=test; }
  g.fillText(lineStr,cx,yy);
}
function rafLoop(ts){
  const dt=lastTs?(ts-lastTs)/1000:0; lastTs=ts; animT+=dt;
  // screen shake
  const now=performance.now();
  if(now<shakeUntil){ const k=(shakeUntil-now)/240; const dx=(Math.random()*2-1)*shakeMag*k, dy=(Math.random()*2-1)*shakeMag*k;
    stageEl.style.transform='translate('+dx.toFixed(1)+'px,'+dy.toFixed(1)+'px)'; }
  else stageEl.style.transform='';
  drawFX();
  requestAnimationFrame(rafLoop);
}

function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function isEquipped(it){ return it===player.equipped.weapon||it===player.equipped.armor||it===player.equipped.backpack; }
function effDesc(it){
  if(it.type==='weapon') return '+'+fmt(it.effect.attack)+' attack';
  if(it.type==='armor')  return '+'+fmt(it.effect.defense)+' defense';
  if(it.type==='backpack') return '+'+it.effect.slots+' inventory slots';
  if(it.type==='potion') return it.effect.heal?('Heals +'+it.effect.heal+' HP'):('Damages '+it.effect.damage+' HP');
  if(it.type==='scroll'){
    if(it.effect.damage_all_enemies) return 'Damages all enemies in radius '+FIRE_RADIUS;
    if(it.effect.teleport_player_random) return 'Teleports you to a random tile';
    if(it.effect.reveal_all_tiles) return 'Reveals the entire map';
    if(it.effect.identify_item) return 'Identifies an item';
  }
  return '';
}
function showTip(it,eq,slot){
  if(TOUCH) return;
  const tip=$('tip');
  tip.innerHTML=`<div class="tname">${esc(it.name)}</div><div class="ttype">${it.type}</div>`+
    `<div class="teff">${esc(effDesc(it))}</div><div class="tval">Value: ${it.value}g</div>`+
    (eq?`<div class="teq">EQUIPPED</div>`:'');
  tip.classList.remove('hidden');
  const r=slot.getBoundingClientRect();
  const w=tip.offsetWidth, h=tip.offsetHeight;
  let x=r.right+8, y=r.top;
  if(x+w>window.innerWidth-8) x=r.left-w-8;
  if(x<8) x=8;
  y=Math.min(y, window.innerHeight-h-8); y=Math.max(8,y);
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
function hideTip(){ $('tip').classList.add('hidden'); }
function slotUse(it){ if(over||paused||uiOpen) return; hideTip(); useItem(it.id); }
function slotDrop(it){ if(over||paused||uiOpen) return; hideTip(); dropItem(it.id); }
function attachSlot(slot,it,eq){
  slot.onclick=()=>slotUse(it);
  slot.oncontextmenu=ev=>{ ev.preventDefault(); slotDrop(it); };
  if(!TOUCH){ slot.onmouseenter=()=>showTip(it,eq,slot); slot.onmouseleave=hideTip; }
  else {
    let lp=0, dropped=false;
    slot.addEventListener('touchstart',ev=>{ ev.preventDefault(); dropped=false; lp=setTimeout(()=>{dropped=true; slotDrop(it);},480); },{passive:false});
    slot.addEventListener('touchend',ev=>{ ev.preventDefault(); clearTimeout(lp); if(!dropped) slotUse(it); },{passive:false});
    slot.addEventListener('touchmove',()=>{ clearTimeout(lp); });
  }
}
function buildInvGrid(el){
  const inv=player.inventory, max=player.maxSlots;
  el.className=el.id==='minv'?'invgrid scrollable':'invgrid'; el.innerHTML='';
  for(let i=0;i<max;i++){
    const it=inv[i], slot=document.createElement('div'); slot.className='slot';
    if(it){
      const eq=isEquipped(it); if(eq) slot.classList.add('equipped');
      const c=document.createElement('canvas'); c.width=48; c.height=48;
      const prev=g; g=c.getContext('2d'); drawItemIcon(it,0,0,48); g=prev;
      slot.appendChild(c); attachSlot(slot,it,eq);
    } else slot.classList.add('empty');
    el.append(slot);
  }
}
function renderInv(){
  if(!player){ return; }
  hideTip();
  const inv=player.inventory, max=player.maxSlots;
  const hdr='Inventory '+inv.length+'/'+max+(player.equipped.backpack?' 🎒':'');

function renderCtx(){

function applyScale(){
  const wrap=$('wrap');

  const w=wrap.offsetWidth, h=wrap.offsetHeight;
  const sc=Math.min(window.innerWidth/w, window.innerHeight/h);
  wrap.style.transform='scale('+sc+')';
}
function toggleFS(){
  if(!document.fullscreenElement){ const el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen||(()=>{})).call(el); }
  else { (document.exitFullscreen||document.webkitExitFullscreen||(()=>{})).call(document); }
}

  return TOUCH && Math.min(window.innerWidth, window.innerHeight) < 860;
}
function tgBack(show){ if(tg&&tg.BackButton){ try{ show?tg.BackButton.show():tg.BackButton.hide(); }catch(e){} } }
function tgInit(){
  if(!tg) return;
  try{ tg.ready(); tg.expand(); }catch(e){}
  try{ const tp=tg.themeParams||{}; if(tp.bg_color) document.body.style.background=tp.bg_color; }catch(e){}
  try{ tg.BackButton.onClick(closeOverlays); }catch(e){}
  try{ tg.onEvent('viewportChanged', resizeMobile); }catch(e){}
  try{ tg.onEvent('invoiceClosed', ev=>{ awaitingPay=false; if(ev&&ev.status==='paid') applyResurrect(); else resMsg('Payment cancelled.'); }); }catch(e){}
}
function bind(el,fn){ if(!el) return;
  el.addEventListener('touchstart',e=>{ e.preventDefault(); fn(); },{passive:false});
  el.addEventListener('click',fn);
}
function addCtxBtn(el,label,fn){ const b=document.createElement('button'); b.textContent=label; b.className='mbtn wide'; bind(b,fn); el.append(b); }
function updateMobileHUD(){
  const m=$('mhud'); if(!m||!player) return; const p=player;
  m.innerHTML=`<div class="mhp"><div style="width:${Math.max(0,100*p.hp/p.max_hp)}%"></div></div>`+
    `<span class="mstat">❤ ${Math.max(0,p.hp)}/${p.max_hp}</span>`+
    `<span class="mstat">⚔ ${fmt(p.attack)}</span><span class="mstat">🛡 ${fmt(p.defense)}</span>`+
    `<span class="mstat">Lv ${p.level}</span>`+
    `<span class="mstat" style="color:var(--gold)">⛀ ${p.gold}</span>`+
    (p.resurrected?`<span class="mstat">⭐ ${p.resurrected}</span>`:'')+
    `<span class="mstat" style="color:var(--accent)">${over?'—':(floor===BOSSFLOOR?'BOSS':'F'+floor)}</span>`;
}
function updateMobileLog(){ const m=$('mlog'); if(!m) return; const n=document.body.classList.contains('landscape')?2:3; m.innerHTML=(logs||[]).slice(-n).map(x=>`<div>${esc(x)}</div>`).join(''); }
function updateMobileCtx(){
  const el=$('mctx'); if(!el) return; el.innerHTML='';
  if(!grid||over) return; const ch=grid[player.y][player.x];
  if(ch==='>') addCtxBtn(el,'⬇ DESCEND',descend);
  if(ch==='<'&&floor>1) addCtxBtn(el,'⬆ ASCEND',ascend);
}
function toggleInv(force){
  const ov=$('invOverlay'); const show = force===undefined ? ov.classList.contains('hidden') : force;
  if(show){ renderInv(); ov.classList.remove('hidden'); tgBack(true); }
  else { ov.classList.add('hidden'); if($('logOverlay').classList.contains('hidden')) tgBack(false); }
}
function toggleLog(force){
  const ov=$('logOverlay'); const show = force===undefined ? ov.classList.contains('hidden') : force;
  if(show){ $('logFull').innerHTML=(logs||[]).map(x=>`<div>${esc(x)}</div>`).join(''); ov.classList.remove('hidden'); tgBack(true); }
  else { ov.classList.add('hidden'); if($('invOverlay').classList.contains('hidden')) tgBack(false); }
}
function closeOverlays(){ toggleInv(false); toggleLog(false); }
function updateOrientation(){
  if(!document.body.classList.contains('mobile')) return;
  document.body.classList.toggle('landscape', window.innerWidth>window.innerHeight);
}
function resizeMobile(){
  if(!document.body.classList.contains('mobile')) return;
  updateOrientation();
  const vw=window.innerWidth, vh=(tg&&tg.viewportStableHeight)?tg.viewportStableHeight:window.innerHeight;
  const st=$('stage');
  if(document.body.classList.contains('landscape')){
    const S=Math.max(vw,vh);                       // square canvas covers the whole screen
    st.style.width=S+'px'; st.style.height=S+'px'; st.style.left=((vw-S)/2)+'px'; st.style.top=((vh-S)/2)+'px';
  } else {
    const S=clamp(Math.floor(Math.min(vw-8, vh-330)), 150, 560);
    st.style.width=S+'px'; st.style.height=S+'px'; st.style.left=''; st.style.top='';
  }
}
let touchTimer=0;
function markTouched(){
  if(!document.body.classList.contains('landscape')) return;
  document.body.classList.add('touched'); clearTimeout(touchTimer);
  touchTimer=setTimeout(()=>document.body.classList.remove('touched'),2500);
}
function bindMobileControls(){
  bind($('mN'),()=>move(0,-1)); bind($('mS'),()=>move(0,1)); bind($('mW'),()=>move(-1,0)); bind($('mE'),()=>move(1,0));
  bind($('mWait'),wait); bind($('mGrab'),pickUp); bind($('mShop'),openShop);
  bind($('mBag'),()=>toggleInv()); bind($('mBagTop'),()=>toggleInv()); bind($('mlog'),()=>toggleLog(true));
  bind($('invClose'),()=>toggleInv(false)); bind($('logClose'),()=>toggleLog(false));
}
function bindSwipe(){
  const c=$('fx'); let sx=0,sy=0;
  c.addEventListener('touchstart',e=>{ const t=e.touches[0]; sx=t.clientX; sy=t.clientY; },{passive:true});
  c.addEventListener('touchend',e=>{ const t=e.changedTouches[0], dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.hypot(dx,dy)<24) return;
    if(Math.abs(dx)>Math.abs(dy)) move(dx>0?1:-1,0); else move(0,dy>0?1:-1);
  },{passive:true});
}
function enableMobile(){
  document.body.classList.add('mobile');
  document.addEventListener('touchmove',e=>{ if(e.target.closest&&e.target.closest('.scrollable')) return; e.preventDefault(); },{passive:false});
  document.addEventListener('gesturestart',e=>e.preventDefault());
  document.addEventListener('touchstart',markTouched,{passive:true});
  document.addEventListener('pointerdown',markTouched,{passive:true});
  bindMobileControls(); bindSwipe(); updateOrientation(); resizeMobile();
  window.addEventListener('resize',()=>{ updateOrientation(); resizeMobile(); });
  window.addEventListener('orientationchange',()=>setTimeout(()=>{ updateOrientation(); resizeMobile(); },200));
}
tgInit();
if(isMobileEnv()) enableMobile();

requestAnimationFrame(rafLoop);
</script>
</body>
